<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Sanitizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <main class="max-w-2xl mx-auto bg-[#16161A] p-8 rounded border border-zinc-800">
        <h1 class="text-2xl font-bold mb-4">Sanitizer</h1>
        <textarea id="raw" class="w-full h-32 p-3 bg-black border border-zinc-800 rounded mb-4"></textarea>
        <button id="btn" class="bg-indigo-600 px-6 py-2 rounded">Sanitize</button>
        <textarea id="clean" class="w-full h-32 mt-4 p-3 bg-black border border-zinc-800 rounded" readonly></textarea>
    </main>
    <script>
        document.getElementById('btn').addEventListener('click', () => {
            let t = document.getElementById('raw').value;
            t = t.replace(/\d{2}:\d{2}:\d{2}[,.]\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}[,.]\d{3}/g, '').replace(/^\d+$/gm, '');
            document.getElementById('clean').value = t.trim();
        });
    </script>
</body>
</html>
