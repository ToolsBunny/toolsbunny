<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Concept Spinner | Toolsbunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Space Grotesk', sans-serif; background: #000; color: white; }</style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md py-3 px-10 flex items-center justify-between border-b border-zinc-900 z-50">
        <a href="/"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" class="h-12 w-auto object-contain" alt="Logo"></a>
    </nav>
    <main class="flex-grow pt-32 pb-20 px-10 max-w-4xl mx-auto w-full">
        <div class="bg-[#16161A] p-8 rounded-lg border border-zinc-900 text-center">
            <h1 class="text-2xl font-bold mb-6">Content Concept Spinner</h1>
            <div id="conceptWindow" class="p-6 bg-black border border-zinc-800 rounded mb-6 min-h-[100px] flex items-center justify-center italic text-zinc-300">Click below to generate your next loop.</div>
            <button id="spinBtn" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded font-bold transition">Spin New Concept</button>
        </div>
    </main>
    <footer class="py-10 border-t border-zinc-900 text-center text-zinc-600 text-[10px] uppercase tracking-widest">&copy; 2026 Toolsbunny — Privacy-First Utilities.</footer>
    <script>
        document.getElementById('spinBtn').addEventListener('click', () => {
            const h = ["Why 99% of creators fail at", "The hidden framework behind"];
            const t = ["scaling organic views.", "audience retention."];
            document.getElementById('conceptWindow').innerText = `"${h[Math.floor(Math.random()*h.length)]} ${t[Math.floor(Math.random()*t.length)]}"`;
        });
    </script>
</body>
</html>
