<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Hook Previewer | Toolsbunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #000; color: #fff; font-family: sans-serif; }</style>
</head>
<body class="p-10">
    <main class="max-w-xl mx-auto bg-[#16161A] p-8 rounded border border-zinc-800">
        <h1 class="text-2xl font-bold mb-4">Title Previewer</h1>
        <input type="text" id="titleIn" placeholder="Enter title hook..." class="w-full p-3 bg-black border border-zinc-800 rounded mb-6">
        <div class="space-y-4">
            <div class="p-4 bg-zinc-900 rounded"><p id="ytText" class="font-bold text-lg">Your title here</p></div>
        </div>
    </main>
    <script>
        document.getElementById('titleIn').addEventListener('input', (e) => {
            document.getElementById('ytText').innerText = e.target.value || "Your title here";
        });
    </script>
</body>
</html>
