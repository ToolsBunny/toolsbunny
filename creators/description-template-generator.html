<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Description Metadata Engine - Toolsbunny</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #080808; color: #F7F1E3; font-family: 'JetBrains Mono', monospace; padding: 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bunny-card { background-color: #16161A; border-radius: 6px; padding: 32px; width: 100%; max-width: 750px; border: 1px solid #2A2A35; }
        .bunny-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #FFFFFF; }
        .bunny-subtitle { color: #8E8E9F; font-size: 0.9rem; margin-bottom: 24px; }
        
        #bunny-ad-slot { margin: 15px 0; min-height: 90px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #635BFF; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 1px; width: 100%; height: 90px; }
        
        .bunny-label { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; color: #635BFF; text-transform: uppercase; }
        .bunny-input { width: 100%; background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #F7F1E3; padding: 10px; font-family: 'JetBrains Mono', monospace; outline: none; margin-bottom: 16px; }
        .bunny-textarea { width: 100%; height: 140px; background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #F7F1E3; padding: 12px; font-family: 'JetBrains Mono', monospace; resize: none; outline: none; margin-bottom: 20px; }
        
        .bunny-gen-btn { background: #00FFC2; color: #080808; border: none; padding: 12px 24px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; border-radius: 6px; cursor: pointer; display: block; width: 100%; font-size: 1rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="bunny-card">
        <h1 class="bunny-title">Description Template Generator</h1>
        <p class="bunny-subtitle">Standardize indexing fields and legal disclosures cleanly inside local memory fields.</p>
        
        <div id="bunny-ad-slot">■ SPONSORSHIP DATA PLACEMENT COMPONENT</div>

        <label class="bunny-label" for="hookSummary">Video Summary Hook</label>
        <input type="text" id="hookSummary" class="bunny-input" value="Unveiling the exact mechanics of systemic wealth management optimization.">

        <label class="bunny-label" for="timestamps">Timestamps Data Block (One Per Line)</label>
        <textarea id="timestamps" class="bunny-textarea" placeholder="0:00 - Introduction&#10;1:45 - The core strategy&#10;5:12 - Execution frameworks"></textarea>

        <button class="bunny-gen-btn" id="genBtn">Compile Standardized Description</button>

        <label class="bunny-label">Final Normalized Output String</label>
        <textarea id="outputBlock" class="bunny-textarea" style="height: 180px; color: #00FFC2;" readonly></textarea>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const genBtn = document.getElementById('genBtn');
            const hookSummary = document.getElementById('hookSummary');
            const timestamps = document.getElementById('timestamps');
            const outputBlock = document.getElementById('outputBlock');

            genBtn.addEventListener('click', () => {
                const hook = hookSummary.value;
                const times = timestamps.value;
                
                const template = `${hook}\n\nTIMESTAMPS:\n${times}\n\n---\nConnect with @cashcompass for premium asset deployment updates.\n\nDisclaimer: Content provided constitutes educational production insights and does not map to direct legal advisement modules.`;
                outputBlock.value = template;
            });
        });
    </script>
</body>
</html>
