<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Content Concept Generator & Spinner - Toolsbunny</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #080808; color: #F7F1E3; font-family: 'JetBrains Mono', monospace; padding: 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bunny-card { background-color: #16161A; border-radius: 6px; padding: 32px; width: 100%; max-width: 700px; border: 1px solid #2A2A35; text-align: center; }
        .bunny-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #FFFFFF; }
        .bunny-subtitle { color: #8E8E9F; font-size: 0.9rem; margin-bottom: 24px; text-align: left; }
        
        #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #635BFF; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 1px; width: 100%; height: 100px; }
        
        .bunny-spinner-container { background: #080808; padding: 24px; border: 1px solid #2A2A35; border-radius: 6px; margin-bottom: 24px; min-height: 120px; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; color: #00FFC2; line-height: 1.4; }
        
        .bunny-spin-btn { background: #635BFF; color: #FFF; border: none; padding: 14px 28px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; border-radius: 6px; cursor: pointer; transition: background 0.2s; font-size: 1rem; width: 100%; }
        .bunny-spin-btn:hover { background: #4b43d3; }
    </style>
</head>
<body>
    <div class="bunny-card">
        <h1 class="bunny-title">Content Concept Engine</h1>
        <p class="bunny-subtitle">Generate optimized raw conceptual foundations to bypass structural blockades.</p>
        
        <div id="bunny-ad-slot">■ SPONSORSHIP DATA PLACEMENT COMPONENT</div>

        <div class="bunny-spinner-container" id="conceptWindow">
            Click down below to generate your next viral distribution loop structure.
        </div>

        <button class="bunny-spin-btn" id="spinBtn">Spin New Concept Matrix</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const spinBtn = document.getElementById('spinBtn');
            const conceptWindow = document.getElementById('conceptWindow');

            const hooks = [
                "Why 99% of creators fail at",
                "The hidden framework behind",
                "Stop scrolling if you care about",
                "This minor mistake completely destroys your",
                "The toxic truth no one tells you about"
            ];

            const targets = [
                "scaling organic asset views.",
                "algorithmic indexing optimization.",
                "audience retention drop-offs.",
                "monetizing side-channel distribution networks.",
                "production system workflows."
            ];

            spinBtn.addEventListener('click', () => {
                const h = hooks[Math.floor(Math.random() * hooks.length)];
                const t = targets[Math.floor(Math.random() * targets.length)];
                conceptWindow.innerText = `"${h} ${t}"`;
            });
        });
    </script>
</body>
</html>
