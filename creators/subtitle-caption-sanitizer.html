<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT/VTT Caption Text Sanitizer - Toolsbunny</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #080808; color: #F7F1E3; font-family: 'JetBrains Mono', monospace; padding: 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bunny-card { background-color: #16161A; border-radius: 6px; padding: 32px; width: 100%; max-width: 800px; border: 1px solid #2A2A35; }
        .bunny-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #FFFFFF; }
        .bunny-subtitle { color: #8E8E9F; font-size: 0.9rem; margin-bottom: 24px; }
        
        #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #635BFF; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 1px; width: 100%; height: 100px; }
        
        .bunny-label { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #635BFF; text-transform: uppercase; }
        .bunny-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        @media(min-width: 650px) { .bunny-grid { grid-template-columns: 1fr 1fr; } }
        
        .bunny-textarea { width: 100%; height: 220px; background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #F7F1E3; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; resize: none; outline: none; transition: border-color 0.2s; }
        .bunny-textarea:focus { border-color: #635BFF; }
        
        .bunny-btn { background: #635BFF; color: #FFF; border: none; padding: 14px 24px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; border-radius: 6px; cursor: pointer; display: block; width: 100%; font-size: 1rem; transition: background 0.2s; }
        .bunny-btn:hover { background: #4b43d3; }
    </style>
</head>
<body>
    <div class="bunny-card">
        <h1 class="bunny-title">Subtitle Caption Sanitizer</h1>
        <p class="bunny-subtitle">Strip down native timestamp logs and structural indices completely into raw human-readable copy.</p>
        
        <div id="bunny-ad-slot">■ SPONSORSHIP DATA PLACEMENT COMPONENT</div>

        <div class="bunny-grid">
            <div>
                <label class="bunny-label" for="rawSubtitles">Raw SRT/VTT Code Stack</label>
                <textarea id="rawSubtitles" class="bunny-textarea" placeholder="1&#10;00:00:01,000 --> 00:00:03,500&#10;Welcome to Cash Compass workflow modules."></textarea>
            </div>
            <div>
                <label class="bunny-label">Sanitized Human Copy Block</label>
                <textarea id="cleanOutput" class="bunny-textarea" style="color: #00FFC2;" readonly placeholder="Cleaned text will compile here dynamically..."></textarea>
            </div>
        </div>

        <button class="bunny-btn" id="sanitizeBtn">Purge Time Stamps & Indices</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawSubtitles = document.getElementById('rawSubtitles');
            const cleanOutput = document.getElementById('cleanOutput');
            const sanitizeBtn = document.getElementById('sanitizeBtn');

            sanitizeBtn.addEventListener('click', () => {
                let text = rawSubtitles.value;
                
                // Strip VTT headers
                text = text.replace(/WEBVTT([\s\S]*?)\n\n/, '');
                // Strip timestamps (SRT and VTT formats)
                text = text.replace(/\d{2}:\d{2}:\d{2}[,.]\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}[,.]\d{3}/g, '');
                // Strip independent block counters
                text = text.replace(/^\d+$/gm, '');
                // Collapse broken blank spaces and return sequences
                text = text.replace(/\n{2,}/g, '\n').trim();
                
                cleanOutput.value = text;
            });
        });
    </script>
</body>
</html>
