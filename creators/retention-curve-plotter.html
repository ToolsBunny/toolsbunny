<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Metrics Retention Curve Plotter - Toolsbunny</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #080808; color: #F7F1E3; font-family: 'JetBrains Mono', monospace; padding: 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bunny-card { background-color: #16161A; border-radius: 6px; padding: 32px; width: 100%; max-width: 750px; border: 1px solid #2A2A35; }
        .bunny-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #FFFFFF; }
        .bunny-subtitle { color: #8E8E9F; font-size: 0.9rem; margin-bottom: 24px; }
        
        #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #635BFF; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 1px; width: 100%; height: 100px; }
        
        .bunny-label { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #635BFF; text-transform: uppercase; }
        .bunny-input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
        .bunny-field-wrap { display: flex; flex-direction: column; }
        .bunny-field-wrap span { font-size: 0.75rem; color: #8E8E9F; margin-bottom: 4px; }
        .bunny-field { width: 100%; background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #F7F1E3; padding: 10px; font-family: 'JetBrains Mono', monospace; outline: none; text-align: center; }
        
        .bunny-chart-area { width: 100%; height: 150px; border-left: 2px solid #2A2A35; border-bottom: 2px solid #2A2A35; position: relative; margin-top: 10px; display: flex; align-items: flex-end; padding-top: 20px; }
        .bunny-chart-bar { flex: 1; margin: 0 8px; background: linear-gradient(180deg, #635BFF, #00FFC2); border-top-left-radius: 4px; border-top-right-radius: 4px; position: relative; min-height: 4px; transition: height 0.3s ease; }
        .bunny-bar-label { position: absolute; top: -22px; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; color: #FFF; }
    </style>
</head>
<body>
    <div class="bunny-card">
        <h1 class="bunny-title">Retention Curve Modeler</h1>
        <p class="bunny-subtitle">Map structural milestone performance retention drops clean inside a local execution context.</p>
        
        <div id="bunny-ad-slot">■ SPONSORSHIP DATA PLACEMENT COMPONENT</div>

        <label class="bunny-label">Milestone Retrospective Retention Metrics (%)</label>
        <div class="bunny-input-grid">
            <div class="bunny-field-wrap">
                <span>0:30 Hook</span>
                <input type="number" id="p1" class="bunny-field" value="70" max="100">
            </div>
            <div class="bunny-field-wrap">
                <span>Midpoint</span>
                <input type="number" id="p2" class="bunny-field" value="50" max="100">
            </div>
            <div class="bunny-field-wrap">
                <span>End Climax</span>
                <input type="number" id="p3" class="bunny-field" value="35" max="100">
            </div>
            <div class="bunny-field-wrap">
                <span>Outro Link</span>
                <input type="number" id="p4" class="bunny-field" value="12" max="100">
            </div>
        </div>

        <div class="bunny-chart-area">
            <div class="bunny-chart-bar" id="bar1"><span class="bunny-bar-label" id="l1">70%</span></div>
            <div class="bunny-chart-bar" id="bar2"><span class="bunny-bar-label" id="l2">50%</span></div>
            <div class="bunny-chart-bar" id="bar3"><span class="bunny-bar-label" id="l3">35%</span></div>
            <div class="bunny-chart-bar" id="bar4"><span class="bunny-bar-label" id="l4">12%</span></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = [
                document.getElementById('p1'),
                document.getElementById('p2'),
                document.getElementById('p3'),
                document.getElementById('p4')
            ];
            const bars = [
                document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3'),
                document.getElementById('bar4')
            ];
            const labels = [
                document.getElementById('l1'),
                document.getElementById('l2'),
                document.getElementById('l3'),
                document.getElementById('l4')
            ];

            function renderChart() {
                inputs.forEach((input, index) => {
                    let val = Math.min(Math.max(parseInt(input.value) || 0, 0), 100);
                    bars[index].style.height = `${val}%`;
                    labels[index].innerText = `${val}%`;
                });
            }

            inputs.forEach(input => input.addEventListener('input', renderChart));
            renderChart();
        });
    </script>
</body>
</html>
