<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsor Integration Pacing Tracker - Toolsbunny</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #080808; color: #F7F1E3; font-family: 'JetBrains Mono', monospace; padding: 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bunny-card { background-color: #16161A; border-radius: 6px; padding: 32px; width: 100%; max-width: 750px; border: 1px solid #2A2A35; }
        .bunny-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #FFFFFF; }
        .bunny-subtitle { color: #8E8E9F; font-size: 0.9rem; margin-bottom: 24px; }
        
        #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #635BFF; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 1px; width: 100%; height: 100px; }
        
        .bunny-label { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #635BFF; text-transform: uppercase; }
        .bunny-input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .bunny-field { width: 100%; background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #F7F1E3; padding: 12px; font-family: 'JetBrains Mono', monospace; outline: none; }
        
        .bunny-results-panel { background-color: #080808; border-radius: 6px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; border: 1px solid #2A2A35; margin-top: 12px; }
        .bunny-metric { display: flex; flex-direction: column; }
        .bunny-metric-label { font-size: 0.75rem; text-transform: uppercase; color: #8E8E9F; font-family: 'Space Grotesk', sans-serif; }
        .bunny-metric-value { font-size: 1.8rem; font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #00FFC2; margin-top: 4px; }
        .bunny-metric-value.warn { color: #FF3B30; }
    </style>
</head>
<body>
    <div class="bunny-card">
        <h1 class="bunny-title">Sponsor Pacing Tracker</h1>
        <p class="bunny-subtitle">Verify that sponsored timeline chunks do not exceed threshold retention safety limits.</p>
        
        <div id="bunny-ad-slot">■ SPONSORSHIP DATA PLACEMENT COMPONENT</div>

        <div class="bunny-input-row">
            <div>
                <label class="bunny-label" for="totalLen">Total Video Length (Seconds)</label>
                <input type="number" id="totalLen" class="bunny-field" value="600">
            </div>
            <div>
                <label class="bunny-label" for="sponsorLen">Sponsor Spot Length (Seconds)</label>
                <input type="number" id="sponsorLen" class="bunny-field" value="60">
            </div>
        </div>

        <div class="bunny-results-panel">
            <div class="bunny-metric">
                <span class="bunny-metric-label">Integration Ratio</span>
                <span class="bunny-metric-value" id="ratioOutput">10.00%</span>
            </div>
            <div class="bunny-metric">
                <span class="bunny-metric-label">Pacing Risk Index</span>
                <span class="bunny-metric-value" id="riskOutput" style="color: #FFFFFF;">OPTIMAL</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const totalLen = document.getElementById('totalLen');
            const sponsorLen = document.getElementById('sponsorLen');
            const ratioOutput = document.getElementById('ratioOutput');
            const riskOutput = document.getElementById('riskOutput');

            function runTracking() {
                const tot = parseFloat(totalLen.value) || 1;
                const sp = parseFloat(sponsorLen.value) || 0;

                const pct = (sp / tot) * 100;
                ratioOutput.innerText = `${pct.toFixed(2)}%`;

                if(pct > 15) {
                    riskOutput.innerText = "HIGH RETENTION RISK";
                    riskOutput.className = "bunny-metric-value warn";
                } else {
                    riskOutput.innerText = "OPTIMAL";
                    riskOutput.className = "bunny-metric-value";
                }
            }

            totalLen.addEventListener('input', runTracking);
            sponsorLen.addEventListener('input', runTracking);
            runTracking();
        });
    </script>
</body>
</html>
