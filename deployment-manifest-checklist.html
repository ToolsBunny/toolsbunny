<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Checklist | Toolsbunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Space Grotesk', sans-serif; background: #000; color: white; }</style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md py-3 px-10 flex items-center justify-between border-b border-zinc-900 z-50">
        <a href="/"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" class="h-12 w-auto object-contain" alt="Logo"></a>
    </nav>
    <main class="flex-grow pt-32 pb-20 px-10 max-w-4xl mx-auto w-full">
        <div class="bg-[#16161A] p-8 rounded-lg border border-zinc-900">
            <h1 class="text-2xl font-bold mb-6">Deployment Checklist</h1>
            <div class="space-y-4">
                <label class="flex items-center gap-3"><input type="checkbox" class="bunny-checkbox w-5 h-5"> Verify assets</label>
                <label class="flex items-center gap-3"><input type="checkbox" class="bunny-checkbox w-5 h-5"> Confirm resolution</label>
            </div>
            <div id="progressIndicator" class="mt-8 p-4 border border-zinc-800 text-center text-sm font-bold">READY STATUS: 0 / 2</div>
        </div>
    </main>
    <footer class="py-10 border-t border-zinc-900 text-center text-zinc-600 text-[10px] uppercase">&copy; 2026 Toolsbunny.</footer>
    <script>
        const boxes = document.querySelectorAll('.bunny-checkbox');
        const ind = document.getElementById('progressIndicator');
        boxes.forEach(b => b.addEventListener('change', () => {
            const count = Array.from(boxes).filter(x => x.checked).length;
            ind.innerText = `READY STATUS: ${count} / ${boxes.length}`;
        }));
    </script>
</body>
</html>
