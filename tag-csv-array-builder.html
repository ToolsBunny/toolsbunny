<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <main class="max-w-2xl mx-auto bg-[#16161A] p-8 rounded border border-zinc-800">
        <textarea id="in" class="w-full p-3 bg-black border border-zinc-800 rounded mb-4"></textarea>
        <div id="out" class="flex flex-wrap gap-2"></div>
    </main>
    <script>
        document.getElementById('in').addEventListener('input', (e) => {
            const tags = e.target.value.split(',').map(t => t.trim()).filter(Boolean);
            document.getElementById('out').innerHTML = tags.map(t => `<span class="bg-zinc-800 px-2 py-1 rounded text-xs">${t}</span>`).join('');
        });
    </script>
</body>
</html>
