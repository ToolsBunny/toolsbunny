<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Aspect Ratio & Resolution Calculator - Toolsbunny</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #080808; color: #F7F1E3; font-family: 'JetBrains Mono', monospace; padding: 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bunny-card { background-color: #16161A; border-radius: 6px; padding: 32px; width: 100%; max-width: 750px; border: 1px solid #2A2A35; }
        .bunny-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #FFFFFF; }
        .bunny-subtitle { color: #8E8E9F; font-size: 0.9rem; margin-bottom: 24px; }
        
        #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #635BFF; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 1px; width: 100%; height: 100px; }
        
        .bunny-label { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #635BFF; text-transform: uppercase; }
        .bunny-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .bunny-field { width: 100%; background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #F7F1E3; padding: 12px; font-family: 'JetBrains Mono', monospace; outline: none; }
        .bunny-field:focus { border-color: #635BFF; }
        
        .bunny-results-panel { background-color: #080808; border-radius: 6px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; border: 1px solid #2A2A35; margin-top: 12px; }
        .bunny-metric { display: flex; flex-direction: column; }
        .bunny-metric-label { font-size: 0.75rem; text-transform: uppercase; color: #8E8E9F; font-family: 'Space Grotesk', sans-serif; }
        .bunny-metric-value { font-size: 1.8rem; font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #00FFC2; margin-top: 4px; }
        
        .bunny-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid #2a2a35; }
        .bunny-btn-share { background: none; border: none; color: #8E8E9F; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; gap: 6px; }
        .bunny-btn-share:hover { color: #FFFFFF; }
    </style>
</head>
<body>
    <div class="bunny-card">
        <h1 class="bunny-title">Aspect Ratio & Resolution Calculator</h1>
        <p class="bunny-subtitle">Lock structural canvas proportions across custom production delivery timelines.</p>
        
        <div id="bunny-ad-slot">■ SPONSORSHIP DATA PLACEMENT COMPONENT</div>

        <div class="bunny-input-grid">
            <div>
                <label class="bunny-label" for="baseWidth">Base Width (px)</label>
                <input type="number" id="baseWidth" class="bunny-field" value="1920">
            </div>
            <div>
                <label class="bunny-label" for="baseHeight">Base Height (px)</label>
                <input type="number" id="baseHeight" class="bunny-field" value="1080">
            </div>
        </div>

        <div class="bunny-input-grid">
            <div>
                <label class="bunny-label" for="targetWidth">Scale to New Width (px)</label>
                <input type="number" id="targetWidth" class="bunny-field" value="3840">
            </div>
            <div>
                <label class="bunny-label">Derived Target Height</label>
                <div class="bunny-results-panel" style="margin: 0; padding: 10px 14px; grid-template-columns: 1fr;">
                    <div class="bunny-metric">
                        <span class="bunny-metric-value" id="calcHeight" style="font-size: 1.25rem; margin: 0;">2160</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bunny-results-panel">
            <div class="bunny-metric">
                <span class="bunny-metric-label">Simplified Ratio</span>
                <span class="bunny-metric-value" id="ratioOutput">16:9</span>
            </div>
            <div class="bunny-metric">
                <span class="bunny-metric-label">Decimal Index</span>
                <span class="bunny-metric-value" id="decimalOutput" style="color: #FFFFFF;">1.78</span>
            </div>
        </div>

        <div class="bunny-share-row">
            <button class="bunny-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
            <button class="bunny-btn-share" id="shareXBtn">𝕏 Share on X</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const baseWidth = document.getElementById('baseWidth');
            const baseHeight = document.getElementById('baseHeight');
            const targetWidth = document.getElementById('targetWidth');
            const calcHeight = document.getElementById('calcHeight');
            const ratioOutput = document.getElementById('ratioOutput');
            const decimalOutput = document.getElementById('decimalOutput');
            const bookmarkBtn = document.getElementById('bookmarkBtn');
            const shareXBtn = document.getElementById('shareXBtn');

            function gcd(a, b) {
                return b ? gcd(b, a % b) : a;
            }

            function updateMetrics() {
                const w = parseInt(baseWidth.value) || 1;
                const h = parseInt(baseHeight.value) || 1;
                const tw = parseInt(targetWidth.value) || 1;

                const factor = gcd(w, h);
                ratioOutput.innerText = `${w / factor}:${h / factor}`;
                
                const decimal = (w / h).toFixed(2);
                decimalOutput.innerText = decimal;

                const th = Math.round((h / w) * tw);
                calcHeight.innerText = isNaN(th) ? 0 : th;
            }

            [baseWidth, baseHeight, targetWidth].forEach(el => el.addEventListener('input', updateMetrics));

            bookmarkBtn.addEventListener('click', () => {
                const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark Toolsbunny!`);
            });

            shareXBtn.addEventListener('click', () => {
                const tweetText = encodeURIComponent("Keep your cross-platform frame resolution clean using this calculator asset from Toolsbunny:");
                const shareUrl = encodeURIComponent("https://toolsbunny.com/aspect-calculator");
                window.open(`https://twitter.com/intent/tweet?text=${tweetText}&url=${shareUrl}`, '_blank', 'noopener,noreferrer');
            });

            updateMetrics();
        });
    </script>
</body>
</html>
