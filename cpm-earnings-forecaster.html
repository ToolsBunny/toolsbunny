<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Forecaster | Toolsbunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Space Grotesk', sans-serif; background: #000; color: white; }</style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md py-3 px-10 flex items-center justify-between border-b border-zinc-900 z-50">
        <a href="/"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" class="h-12 w-auto object-contain" alt="Logo"></a>
    </nav>
    <main class="flex-grow pt-32 pb-20 px-10 max-w-4xl mx-auto w-full">
        <div class="bg-[#16161A] p-8 rounded-lg border border-zinc-900">
            <h1 class="text-2xl font-bold mb-6">Revenue Forecast Matrix</h1>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="number" id="estViews" class="p-3 bg-black border border-zinc-800 rounded" placeholder="Est. Views">
                <input type="number" id="targetCpm" class="p-3 bg-black border border-zinc-800 rounded" placeholder="Target CPM">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-black border border-zinc-800 rounded"><p class="text-xs uppercase text-zinc-500">Gross</p><p id="grossOutput" class="text-xl text-teal-400">$0.00</p></div>
                <div class="p-4 bg-black border border-zinc-800 rounded"><p class="text-xs uppercase text-zinc-500">Net (55%)</p><p id="netOutput" class="text-xl text-white">$0.00</p></div>
            </div>
        </div>
    </main>
    <footer class="py-10 border-t border-zinc-900 text-center text-zinc-600 text-[10px] uppercase">&copy; 2026 Toolsbunny.</footer>
    <script>
        const estViews = document.getElementById('estViews');
        const targetCpm = document.getElementById('targetCpm');
        const grossOutput = document.getElementById('grossOutput');
        const netOutput = document.getElementById('netOutput');
        function runForecast() {
            const g = (parseFloat(estViews.value) / 1000) * parseFloat(targetCpm.value) || 0;
            grossOutput.innerText = `$${g.toFixed(2)}`;
            netOutput.innerText = `$${(g * 0.55).toFixed(2)}`;
        }
        [estViews, targetCpm].forEach(el => el.addEventListener('input', runForecast));
    </script>
</body>
</html>
