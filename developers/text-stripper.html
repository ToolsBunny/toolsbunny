<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI Text Formatting Cleaner | Markdown & LaTeX Stripper</title>
  <meta name="description" content="Instantly clean markdown syntax, mathematical block text wrappers, and LaTeX codes from raw AI text exports.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { obsidian: '#080808', void: '#16161A', stripe: '#635BFF', mint: '#00FFC2', darkBorder: '#2A2A35' }, fontFamily: { heading: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }, borderRadius: { 'pulse': '6px' } } }
    }
  </script>
  <style>
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    .pulse-card-wrapper { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    .pulse-box { background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; resize: none; outline: none; color: #D4D4D8; }
    .pulse-box:focus { border-color: #635BFF; }
    #pulse-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .pulse-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .pulse-btn-share { background: none; border: none; color: #A1A1AA; font-size: 12px; cursor: pointer; }
    .pulse-btn-share:hover { color: #ffffff; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-5xl pulse-card-wrapper p-6 shadow-2xl">
    <div class="flex items-center justify-between border-b border-darkBorder pb-4">
      <div class="flex items-center gap-3">
        <i data-lucide="sparkles" class="text-mint w-6 h-6"></i>
        <h1 class="text-xl tracking-tight uppercase text-white">Markdown & LaTeX Stripper</h1>
      </div>
    </div>

    <div id="pulse-ad-slot">
      <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Advertisement Placeholder</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="text-xs uppercase tracking-wider text-zinc-400 block mb-2">Raw AI Output Input</label>
        <textarea id="dirty-input" placeholder="Paste structural text containing markdown tags, bolding, code backticks..." class="w-full h-64 pulse-box p-4 text-xs"></textarea>
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-zinc-400 block mb-2">Sanitized Clear Content</label>
        <textarea id="clean-output" readonly placeholder="Pristine structural plaintext outputs here..." class="w-full h-64 pulse-box p-4 text-xs opacity-80"></textarea>
      </div>
    </div>

    <div class="flex items-center justify-between border-t border-darkBorder mt-6 pt-4">
      <span class="text-[11px] text-zinc-500">Auto-wipes header syntax metrics, italics, bold arrays, and code containers.</span>
      <button id="copy-clean" class="px-5 py-2 text-xs uppercase tracking-wider bg-stripe text-white rounded-pulse font-heading">
        Copy Clean Text
      </button>
    </div>

    <div class="pulse-share-row">
      <button class="pulse-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="pulse-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const dirty = document.getElementById('dirty-input');
    const clean = document.getElementById('clean-output');

    dirty.addEventListener('input', () => {
      let text = dirty.value;
      text = text.replace(/\$\$([\s\S]*?)\$\_/g, '$1').replace(/\$([^$ \n]+?)\$/g, '$1');
      text = text.replace(/^\s*#{1,6}\s+(.*)$/gm, '$1');
      text = text.replace(/(\*\*|__)(.*?)\1/g, '$2').replace(/(\*|_)(.*?)\1/g, '$2');
      text = text.replace(/```[a-z]*\n([\s\S]*?)\n```/g, '$1').replace(/`([^`]+)`/g, '$1');
      clean.value = text.replace(/\n{3,}/g, '\n\n');
    });

    document.getElementById('copy-clean').addEventListener('click', () => {
      if(!clean.value) return;
      navigator.clipboard.writeText(clean.value);
    });

    document.getElementById('bookmarkBtn').addEventListener('click', () => {
      alert("Press Ctrl+D or Cmd+D to save this syntax cleaner.");
    });

    document.getElementById('shareXBtn').addEventListener('click', () => {
      const shareText = encodeURIComponent("Strip markdown parameters out of ChatGPT data configurations fast before writing emails:");
      window.open(`https://twitter.com/intent/tweet?text=${shareText}&url=${encodeURIComponent(window.location.href)}`, '_blank');
    });
  </script>
</body>
</html>
