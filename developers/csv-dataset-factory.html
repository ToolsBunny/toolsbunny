<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabular CSV Fine-Tuning Few-Shot Prompt Dataset Factory | Toolsbunny</title>
  <meta name="description" content="Process raw CSV grid text data arrays into markdown compilation instances for contextual fine-tuning prompts.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { obsidian: '#080808', void: '#16161A', stripe: '#635BFF', mint: '#00FFC2', darkBorder: '#2A2A35' }, fontFamily: { heading: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }, borderRadius: { 'pulse': '6px' } } }
    }
  </script>
  <style>
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    .pulse-card-frame { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    .pulse-text-container { background-color: #080808; border: 1px solid #2A2A35; border-radius: 6px; color: #D4D4D8; outline: none; resize: none; font-family: monospace; }
    #pulse-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .pulse-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .pulse-btn-share { background: none; border: none; color: #A1A1AA; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-5xl pulse-card-frame p-6 shadow-2xl">
    <div class="flex items-center justify-between border-b border-darkBorder pb-4">
      <div class="flex items-center gap-3">
        <i data-lucide="table-2" class="text-mint w-6 h-6"></i>
        <h1 class="text-xl tracking-tight uppercase text-white">CSV Few-Shot Dataset Factory</h1>
      </div>
    </div>

    <div id="pulse-ad-slot">
      <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Advertisement Placeholder</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <textarea id="csv-field" placeholder="prompt,completion&#10;Hello,Hi clear framework user!&#10;Help,Running compilation patterns logs..." class="w-full h-40 pulse-text-container p-3 text-xs"></textarea>
      <textarea id="md-field" readonly placeholder="Markdown dynamic training compilation blocks outputs print here..." class="w-full h-40 pulse-text-container p-3 text-xs text-zinc-500"></textarea>
    </div>

    <button id="run-conv" class="mt-4 px-5 py-2 bg-stripe font-heading text-xs text-white uppercase rounded-pulse tracking-wide">Generate Conversational Node Blocks</button>

    <div class="pulse-share-row">
      <button class="pulse-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="pulse-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const csv = document.getElementById('csv-field'); const md = document.getElementById('md-field');
    document.getElementById('run-conv').addEventListener('click', () => {
      const val = csv.value.trim(); if(!val) return;
      const lines = val.split('\n'); let out = "";
      lines.forEach((l, i) => {
        let p = l.split(','); if(p.length >= 2) out += `### MODEL INSTANCE NODE ${i}\n- **Input Stream Core**: ${p[0].trim()}\n- **Expected Response Target**: ${p[1].trim()}\n\n`;
      }); md.value = out;
    });
    document.getElementById('bookmarkBtn').addEventListener('click', () => alert("Dataset structure constructor tool pinned template parameters."));
    document.getElementById('shareXBtn').addEventListener('click', () => window.open('https://twitter.com/intent/tweet', '_blank'));
  </script>
</body>
</html>
