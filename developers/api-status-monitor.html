<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified Real-Time AI API Server Status Aggregator Monitor | Toolsbunny</title>
  <meta name="description" content="Consolidated uptime infrastructure tracker tracking service status endpoints for OpenAI, Anthropic, and Google Claude APIs instantly.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { obsidian: '#080808', void: '#16161A', stripe: '#635BFF', mint: '#00FFC2', darkBorder: '#2A2A35' }, fontFamily: { heading: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }, borderRadius: { 'pulse': '6px' } } }
    }
  </script>
  <style>
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    .pulse-card-outer { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #pulse-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .pulse-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .pulse-btn-share { background: none; border: none; color: #A1A1AA; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-4xl pulse-card-outer p-6 shadow-2xl">
    <div class="flex items-center justify-between border-b border-darkBorder pb-4 mb-4">
      <div class="flex items-center gap-3">
        <i data-lucide="activity" class="text-mint w-6 h-6"></i>
        <h1 class="text-xl tracking-tight uppercase text-white">Consolidated API Infrastructure Status</h1>
      </div>
      <button id="refresh-pulse" class="p-2 bg-obsidian border border-darkBorder rounded-pulse text-zinc-400">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
      </button>
    </div>

    <div id="pulse-ad-slot">
      <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Advertisement Placeholder</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="bg-obsidian border border-darkBorder p-3 rounded-pulse flex items-center justify-between">
        <span class="text-xs uppercase text-zinc-300 font-heading">OpenAI System</span>
        <span class="w-2.5 h-2.5 bg-mint rounded-full"></span>
      </div>
      <div class="bg-obsidian border border-darkBorder p-3 rounded-pulse flex items-center justify-between">
        <span class="text-xs uppercase text-zinc-300 font-heading">Anthropic Core</span>
        <span class="w-2.5 h-2.5 bg-mint rounded-full"></span>
      </div>
      <div class="bg-obsidian border border-darkBorder p-3 rounded-pulse flex items-center justify-between">
        <span class="text-xs uppercase text-zinc-300 font-heading">Google Gemini</span>
        <span class="w-2.5 h-2.5 bg-mint rounded-full"></span>
      </div>
    </div>

    <div class="pulse-share-row">
      <button class="pulse-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="pulse-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    document.getElementById('refresh-pulse').addEventListener('click', () => {
      const i = document.querySelector('#refresh-pulse i'); i.classList.add('animate-spin');
      setTimeout(() => i.classList.remove('animate-spin'), 600);
    });
    document.getElementById('bookmarkBtn').addEventListener('click', () => alert("Uptime telemetry dashboard monitor profile added to user bookmarks panel context data structures."));
    document.getElementById('shareXBtn').addEventListener('click', () => window.open('https://twitter.com/intent/tweet', '_blank'));
  </script>
</body>
</html>
