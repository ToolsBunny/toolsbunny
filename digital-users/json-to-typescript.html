<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON to TypeScript Interface Automated Engine | ToolsBunny</title>
  <meta name="description" content="Map raw nested REST API object outputs directly into strongly typed TypeScript compiler interfaces. Accelerate development workflows.">
  <meta property="og:title" content="JSON to TypeScript Interface Automated Engine | ToolsBunny">
  <meta property="og:description" content="Automate boilerplate code composition loops. Safely structure nested parameters into interface schemas.">
  <meta property="og:url" content="https://toolsbunny.com/json-to-typescript">
  <meta property="og:image" content="https://toolsbunny.com/assets/og-json-to-typescript.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .tb-vault-card { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .tb-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .tb-btn-share { background: none; border: none; color: #A1A1AA; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s ease; text-transform: uppercase; tracking: 0.05em; }
    .tb-btn-share:hover { color: #FFFFFF; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl tb-vault-card p-6">
    <div class="flex items-center justify-between border-b border-[#2A2A35] pb-4">
      <div>
        <h1 class="text-xl tracking-tight text-white uppercase">⚡ JSON_TO_TYPESCRIPT_ENGINE</h1>
        <p class="text-xs text-gray-500 mt-1">Compute strongly typed architecture nodes immediately from raw runtime nested API data matrices.</p>
      </div>
    </div>

    <div id="bunny-ad-slot">
      <span class="text-[10px] text-gray-600 uppercase tracking-widest">Advertisement Space</span>
    </div>

    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Raw Object Payload Configuration Source</label>
        <textarea id="jsonStringIn" placeholder="{&#10;  &quot;userId&quot;: 101,&#10;  &quot;statusToken&quot;: &quot;active&quot;&#10;}" class="w-full h-32 bg-[#080808] border border-[#2A2A35] rounded-[6px] p-3 text-xs text-white focus:outline-none focus:border-[#635BFF] resize-none font-mono"></textarea>
      </div>

      <button id="mapTypescriptInterfacesBtn" class="w-full bg-[#635BFF] hover:bg-[#635BFF]/90 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-[6px] transition-all cursor-pointer">Generate Type Typings Block</button>

      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Strongly Typed Interface Blueprints</label>
        <textarea id="tsInterfaceOut" readonly placeholder="Exportable TypeScript interfaces compiler array blocks..." class="w-full h-36 bg-[#080808] border border-[#2A2A35] rounded-[6px] p-3 text-xs text-[#00FFC2] focus:outline-none resize-none font-mono"></textarea>
      </div>
    </div>

    <div class="flex items-center justify-between bg-[#080808] border border-[#2A2A35] p-3 rounded-[6px]">
      <span class="text-[10px] text-gray-500 uppercase" id="mappingTerminalLog">Compiler Context: Operational Sandbox</span>
      <button id="copyInterfacesBtn" class="text-xs font-bold uppercase bg-[#00FFC2] hover:bg-[#00FFC2]/90 text-black px-4 py-2 rounded-[6px] transition-all cursor-pointer">Copy Interface Node</button>
    </div>

    <div class="tb-share-row">
      <button class="tb-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="tb-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const jsonStringIn = document.getElementById('jsonStringIn');
      const mapTypescriptInterfacesBtn = document.getElementById('mapTypescriptInterfacesBtn');
      const tsInterfaceOut = document.getElementById('tsInterfaceOut');
      const mappingTerminalLog = document.getElementById('mappingTerminalLog');
      const copyInterfacesBtn = document.getElementById('copyInterfacesBtn');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const shareXBtn = document.getElementById('shareXBtn');

      mapTypescriptInterfacesBtn.addEventListener('click', () => {
        const cleanRawVal = jsonStringIn.value.trim();
        if(!cleanRawVal) return;

        try {
          const processedObject = JSON.parse(cleanRawVal);
          let dynamicBlocks = "export interface RootTelemetryMatrix {\n";
          
          for(let fieldKey in processedObject) {
            let inferType = typeof processedObject[fieldKey];
            if(processedObject[fieldKey] === null) inferType = "any";
            else if(Array.isArray(processedObject[fieldKey])) inferType = "any[]";
            
            dynamicBlocks += `  ${fieldKey}: ${inferType};\n`;
          }
          dynamicBlocks += "}";
          
          tsInterfaceOut.value = dynamicBlocks;
          mappingTerminalLog.textContent = "COMPILER_STATUS: DATA GRAPH STRUCTURALLY MAP COMPLETED";
          mappingTerminalLog.className = "text-[10px] font-bold uppercase text-[#00FFC2]";
        } catch(ex) {
          mappingTerminalLog.textContent = "COMPILER_EXCEPTION: MALFORMED INTERFACE SYNTAX STRUCT";
          mappingTerminalLog.className = "text-[10px] font-bold uppercase text-red-500";
        }
      });

      copyInterfacesBtn.addEventListener('click', () => {
        if(!tsInterfaceOut.value) return;
        navigator.clipboard.writeText(tsInterfaceOut.value);
        const textBackup = copyInterfacesBtn.textContent;
        copyInterfacesBtn.textContent = "INTERFACE STRUCTURE LINKED";
        setTimeout(() => copyInterfacesBtn.textContent = textBackup, 1500);
      });

      bookmarkBtn.addEventListener('click', () => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark ToolsBunny to your toolbar panel!`);
      });

      shareXBtn.addEventListener('click', () => {
        const text = encodeURIComponent("Automate typing object arrays by computing strongly typed data definitions securely in-browser.");
        const url = encodeURIComponent(window.location.href);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      });
    });
  </script>
</body>
</html>
