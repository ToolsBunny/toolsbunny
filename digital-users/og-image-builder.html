<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Open Graph (OG) Image Automation Template | ToolsBunny</title>
  <meta name="description" content="Generate graphic title banners matching exact social dimension requirements. Automate social share cards with no design tool bloat.">
  <meta property="og:title" content="Dynamic Open Graph (OG) Image Automation Template | ToolsBunny">
  <meta property="og:description" content="Automate meta imagery compositions programmatically inside local browser execution containers instantly.">
  <meta property="og:url" content="https://toolsbunny.com/og-image-builder">
  <meta property="og:image" content="https://toolsbunny.com/assets/og-og-image-builder.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .tb-vault-card { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .tb-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .tb-btn-share { background: none; border: none; color: #A1A1AA; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s ease; text-transform: uppercase; tracking: 0.05em; }
    .tb-btn-share:hover { color: #FFFFFF; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl tb-vault-card p-6">
    <div class="flex items-center justify-between border-b border-[#2A2A35] pb-4">
      <div>
        <h1 class="text-xl tracking-tight text-white uppercase">🎭 OG_IMAGE_AUTOMATION</h1>
        <p class="text-xs text-gray-500 mt-1">Synthesize meta share banners natively onto high density device display targets instantly.</p>
      </div>
    </div>

    <div id="bunny-ad-slot">
      <span class="text-[10px] text-gray-600 uppercase tracking-widest">Advertisement Space</span>
    </div>

    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Asset Main Core Title Heading Text</label>
        <input type="text" id="bannerHeadingTextIn" value="PRODUCTION SERVICE PLATFORM WORKSPACE" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2.5 text-xs text-white focus:outline-none focus:border-[#635BFF]">
      </div>

      <button id="renderCanvasAssetBtn" class="w-full bg-[#635BFF] hover:bg-[#635BFF]/90 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-[6px] transition-all cursor-pointer">Compile Graphics Canvas Coordinates</button>

      <div class="flex justify-center">
        <canvas id="ogImageCompilationCanvas" width="1200" height="630" class="max-w-full border border-[#2A2A35] rounded-[6px] bg-[#080808] h-48"></canvas>
      </div>
    </div>

    <div class="flex items-center justify-between bg-[#080808] border border-[#2A2A35] p-3 rounded-[6px]">
      <span class="text-[10px] text-gray-500 uppercase" id="canvasEngineStatus">Canvas Layout Engine: Idle Status</span>
    </div>

    <div class="tb-share-row">
      <button class="tb-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="tb-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const bannerHeadingTextIn = document.getElementById('bannerHeadingTextIn');
      const renderCanvasAssetBtn = document.getElementById('renderCanvasAssetBtn');
      const ogImageCompilationCanvas = document.getElementById('ogImageCompilationCanvas');
      const canvasEngineStatus = document.getElementById('canvasEngineStatus');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const shareXBtn = document.getElementById('shareXBtn');

      renderCanvasAssetBtn.addEventListener('click', () => {
        const textToPaint = bannerHeadingTextIn.value.toUpperCase();
        const renderingContext = ogImageCompilationCanvas.getContext('2d');
        
        // Compute canvas drawing matrix arrays properties
        renderingContext.fillStyle = '#0f0f12';
        renderingContext.fillRect(0, 0, 1200, 630);
        
        renderingContext.fillStyle = '#635BFF';
        renderingContext.fillRect(0, 0, 30, 630);
        
        renderingContext.fillStyle = '#ffffff';
        renderingContext.font = 'bold 42px monospace';
        renderingContext.fillText(textToPaint, 100, 315);

        canvasEngineStatus.textContent = "CANVAS_STATUS: GRAPHICS CONTEXT PIXELS BUFFER COMPILED SUCCESS";
        canvasEngineStatus.className = "text-[10px] font-bold uppercase text-[#00FFC2]";
      });

      bookmarkBtn.addEventListener('click', () => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark ToolsBunny to your toolbar panel!`);
      });

      shareXBtn.addEventListener('click', () => {
        const text = encodeURIComponent("Ditch complex canvas server generation logic layers. Render link image cards completely inside isolated workspace client frames.");
        const url = encodeURIComponent(window.location.href);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      });
    });
  </script>
</body>
</html>
