<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Team Best Meeting Window Calculator | ToolsBunny</title>
  <meta name="description" content="Calculate and map perfect team schedule overlaps across global operational timezones instantly. Eliminate confusion for distributed distributed squads.">
  <meta property="og:title" content="Remote Team Best Meeting Window Calculator | ToolsBunny">
  <meta property="og:description" content="Map distributed timezone windows instantly inside a local data visualization matrix dashboard.">
  <meta property="og:url" content="https://toolsbunny.com/timezone-matcher">
  <meta property="og:image" content="https://toolsbunny.com/assets/og-timezone-matcher.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .tb-vault-card { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .tb-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .tb-btn-share { background: none; border: none; color: #A1A1AA; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s ease; text-transform: uppercase; tracking: 0.05em; }
    .tb-btn-share:hover { color: #FFFFFF; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl tb-vault-card p-6">
    <div class="flex items-center justify-between border-b border-[#2A2A35] pb-4">
      <div>
        <h1 class="text-xl tracking-tight text-white uppercase">📅 SYNC_WINDOW_MATRIX</h1>
        <p class="text-xs text-gray-500 mt-1">Cross-reference cross-border operations channels to locate high overlap operational blocks.</p>
      </div>
    </div>

    <div id="bunny-ad-slot">
      <span class="text-[10px] text-gray-600 uppercase tracking-widest">Advertisement Space</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Primary Local Host Timezone</label>
        <select id="originZoneSelect" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2.5 text-xs text-white focus:outline-none focus:border-[#635BFF]">
          <option value="0">UTC - Coordinated Universal Frame</option>
          <option value="-5" selected>EST - America Eastern Node</option>
          <option value="1">CET - Central European Cluster</option>
          <option value="8">SGT - Singapore Operations Node</option>
        </select>
      </div>

      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Target Dynamic Remote Node</label>
        <select id="targetZoneSelect" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2.5 text-xs text-white focus:outline-none focus:border-[#635BFF]">
          <option value="0">UTC - Coordinated Universal Frame</option>
          <option value="-5">EST - America Eastern Node</option>
          <option value="1" selected>CET - Central European Cluster</option>
          <option value="8">SGT - Singapore Operations Node</option>
        </select>
      </div>
    </div>

    <button id="calculateTimeMatrixBtn" class="w-full bg-[#635BFF] hover:bg-[#635BFF]/90 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-[6px] transition-all cursor-pointer mb-6">Compute Intersection Array</button>

    <div class="bg-[#080808] border border-[#2A2A35] p-4 rounded-[6px] text-xs">
      <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-2">Calculated Overlap Sync Channels (14:00 - 18:00 Standard Target Range)</p>
      <div id="overlapOutputView" class="text-[#00FFC2] font-mono whitespace-pre-line">Initialize the calculator matrix link...</div>
    </div>

    <div class="tb-share-row">
      <button class="tb-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="tb-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const originZoneSelect = document.getElementById('originZoneSelect');
      const targetZoneSelect = document.getElementById('targetZoneSelect');
      const calculateTimeMatrixBtn = document.getElementById('calculateTimeMatrixBtn');
      const overlapOutputView = document.getElementById('overlapOutputView');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const shareXBtn = document.getElementById('shareXBtn');

      calculateTimeMatrixBtn.addEventListener('click', () => {
        const sourceOffset = parseInt(originZoneSelect.value, 10);
        const targetOffset = parseInt(targetZoneSelect.value, 10);
        
        let calculatedOutputStr = "";
        
        // Loop cross referencing standard hours arrays logic matrix
        for(let initialHour = 9; initialHour <= 18; initialHour++) {
          let convertedTargetHour = (initialHour - sourceOffset + targetOffset + 24) % 24;
          if(convertedTargetHour >= 9 && convertedTargetHour <= 18) {
            calculatedOutputStr += `✦ HOST STREAM SLOT: ${initialHour.toString().padStart(2, '0')}:00 ──► REMOTE NODE WINDOW: ${convertedTargetHour.toString().padStart(2, '0')}:00 [MATCHED ACTIVE SYNC]\n`;
          }
        }

        overlapOutputView.textContent = calculatedOutputStr || "CRITICAL TIME GAP: NO STANDARD MATCHING WINDOW IN OPERATION LOGS.";
      });

      bookmarkBtn.addEventListener('click', () => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark ToolsBunny to your toolbar panel!`);
      });

      shareXBtn.addEventListener('click', () => {
        const text = encodeURIComponent("Coordinate cross border standups inside an isolated client clock grid instantly.");
        const url = encodeURIComponent(window.location.href);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      });
    });
  </script>
</body>
</html>
