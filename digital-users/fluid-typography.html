<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Fluid Typography & CSS Clamp Calculator | ToolsBunny</title>
  <meta name="description" content="Generate complex CSS clamp(min, pref, max) styling values mathematically to ensure responsive layouts scale across devices.">
  <meta property="og:title" content="Responsive Fluid Typography & CSS Clamp Calculator | ToolsBunny">
  <meta property="og:description" content="Compute modern linear interpolation formulas instantly for high performance CSS typography frameworks.">
  <meta property="og:url" content="https://toolsbunny.com/fluid-typography">
  <meta property="og:image" content="https://toolsbunny.com/assets/og-fluid-typography.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .tb-vault-card { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .tb-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .tb-btn-share { background: none; border: none; color: #A1A1AA; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s ease; text-transform: uppercase; tracking: 0.05em; }
    .tb-btn-share:hover { color: #FFFFFF; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl tb-vault-card p-6">
    <div class="flex items-center justify-between border-b border-[#2A2A35] pb-4">
      <div>
        <h1 class="text-xl tracking-tight text-white uppercase">📐 CSS_CLAMP_MATHEMATICS</h1>
        <p class="text-xs text-gray-500 mt-1">Compute linear interpolation styling boundaries for screen adaptive configurations automatically.</p>
      </div>
    </div>

    <div id="bunny-ad-slot">
      <span class="text-[10px] text-gray-600 uppercase tracking-widest">Advertisement Space</span>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Min Screen (px)</label>
        <input type="number" id="viewportMinPx" value="320" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2 text-xs text-white focus:outline-none">
      </div>
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Max Screen (px)</label>
        <input type="number" id="viewportMaxPx" value="1200" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2 text-xs text-white focus:outline-none">
      </div>
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Min Size (rem)</label>
        <input type="text" id="fontSizeMinRem" value="1rem" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2 text-xs text-white focus:outline-none">
      </div>
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Max Size (rem)</label>
        <input type="text" id="fontSizeMaxRem" value="2.5rem" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2 text-xs text-white focus:outline-none">
      </div>
    </div>

    <button id="computeClampLogicBtn" class="w-full bg-[#635BFF] hover:bg-[#635BFF]/90 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-[6px] transition-all cursor-pointer mb-4">Calculate Formula Matrix</button>

    <div class="space-y-2">
      <label class="block text-[10px] text-gray-400 uppercase tracking-widest">Computed Rule Expression</label>
      <input type="text" id="clampCompiledOutput" readonly placeholder="Calculated dynamic layout syntax tokens..." class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-3 text-xs text-[#00FFC2] font-mono">
    </div>

    <div class="tb-share-row">
      <button class="tb-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="tb-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const viewportMinPx = document.getElementById('viewportMinPx');
      const viewportMaxPx = document.getElementById('viewportMaxPx');
      const fontSizeMinRem = document.getElementById('fontSizeMinRem');
      const fontSizeMaxRem = document.getElementById('fontSizeMaxRem');
      const computeClampLogicBtn = document.getElementById('computeClampLogicBtn');
      const clampCompiledOutput = document.getElementById('clampCompiledOutput');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const shareXBtn = document.getElementById('shareXBtn');

      computeClampLogicBtn.addEventListener('click', () => {
        const minSc = parseFloat(viewportMinPx.value);
        const maxSc = parseFloat(viewportMaxPx.value);
        const minSz = parseFloat(fontSizeMinRem.value);
        const maxSz = parseFloat(fontSizeMaxRem.value);

        // Linear scaling interpolation parameters derivation loop mechanics
        const variableSlope = (maxSz - minSz) / ((maxSc - minSc) / 16);
        const variableIntersection = minSz - (variableSlope * (minSc / 16));

        clampCompiledOutput.value = `font-size: clamp(${minSz}rem, ${variableIntersection.toFixed(4)}rem + ${(variableSlope * 100).toFixed(4)}vw, ${maxSz}rem);`;
      });

      bookmarkBtn.addEventListener('click', () => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark ToolsBunny to your toolbar panel!`);
      });

      shareXBtn.addEventListener('click', () => {
        const text = encodeURIComponent("Ditch media query complexity matrices. Calculate responsive UI viewport linear values natively.");
        const url = encodeURIComponent(window.location.href);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      });
    });
  </script>
</body>
</html>
