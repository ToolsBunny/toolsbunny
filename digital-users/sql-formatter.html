<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Query Prettifier & Error Diagnostic Console | ToolsBunny</title>
  <meta name="description" content="Organize messy, single-line raw SQL database query logs into perfectly structured, indented, and readable query logic blocks instantly.">
  <meta property="og:title" content="SQL Query Prettifier & Error Diagnostic Console | ToolsBunny">
  <meta property="og:description" content="Beautify unformatted PostgreSQL, MySQL, and generic query arrays locally inside your machine sandbox.">
  <meta property="og:url" content="https://toolsbunny.com/sql-formatter">
  <meta property="og:image" content="https://toolsbunny.com/assets/og-sql-formatter.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .tb-vault-card { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .tb-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .tb-btn-share { background: none; border: none; color: #A1A1AA; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s ease; text-transform: uppercase; tracking: 0.05em; }
    .tb-btn-share:hover { color: #FFFFFF; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl tb-vault-card p-6">
    <div class="flex items-center justify-between border-b border-[#2A2A35] pb-4">
      <div>
        <h1 class="text-xl tracking-tight text-white uppercase">🧹 SQL_QUERY_PRETTIFIER</h1>
        <p class="text-xs text-gray-500 mt-1">Re-align unformatted transactional statements into readable schema trees locally.</p>
      </div>
    </div>

    <div id="bunny-ad-slot">
      <span class="text-[10px] text-gray-600 uppercase tracking-widest">Advertisement Space</span>
    </div>

    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Raw Query Payload Matrix</label>
        <textarea id="sqlStatementInput" placeholder="SELECT * FROM metrics_log WHERE activity_status = 'active' AND tier_index &gt;= 10 GROUP BY timestamp_node;" class="w-full h-32 bg-[#080808] border border-[#2A2A35] rounded-[6px] p-3 text-xs text-white focus:outline-none focus:border-[#635BFF] resize-none font-mono"></textarea>
      </div>

      <button id="formatQueryBtn" class="w-full bg-[#635BFF] hover:bg-[#635BFF]/90 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-[6px] transition-all cursor-pointer">Reconstruct Structural Queries</button>

      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Formatted Readable Schema Logic</label>
        <textarea id="formattedSqlOutput" readonly placeholder="Beautified structured query logs visualization stream..." class="w-full h-36 bg-[#080808] border border-[#2A2A35] rounded-[6px] p-3 text-xs text-[#00FFC2] focus:outline-none resize-none font-mono"></textarea>
      </div>
    </div>

    <div class="flex items-center justify-between bg-[#080808] border border-[#2A2A35] p-3 rounded-[6px]">
      <span class="text-[10px] text-gray-500 uppercase" id="formattingConsoleLog">Diagnostics: Operational Matrix</span>
    </div>

    <div class="tb-share-row">
      <button class="tb-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="tb-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sqlStatementInput = document.getElementById('sqlStatementInput');
      const formatQueryBtn = document.getElementById('formatQueryBtn');
      const formattedSqlOutput = document.getElementById('formattedSqlOutput');
      const formattingConsoleLog = document.getElementById('formattingConsoleLog');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const shareXBtn = document.getElementById('shareXBtn');

      formatQueryBtn.addEventListener('click', () => {
        let originalSql = sqlStatementInput.value.trim();
        if(!originalSql) return;

        // Perform clean programmatic structural database token spacing rules replacement
        let formattedStr = originalSql
          .replace(/\b(SELECT|FROM|WHERE|AND|OR|GROUP BY|ORDER BY|JOIN|LEFT JOIN|HAVING)\b/gi, '\n$1\n ')
          .replace(/\s+/g, ' ')
          .replace(/\n\s*/g, '\n')
          .trim();

        formattedSqlOutput.value = formattedStr;
        formattingConsoleLog.textContent = "DIAGNOSTICS: 0 SCHEMA STRUCTURAL PARSE ISSUES PRESENT";
        formattingConsoleLog.className = "text-[10px] font-bold uppercase text-[#00FFC2]";
      });

      bookmarkBtn.addEventListener('click', () => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark ToolsBunny to your toolbar panel!`);
      });

      shareXBtn.addEventListener('click', () => {
        const text = encodeURIComponent("Convert unreadable cloud database transaction strings into clean formatted statements securely.");
        const url = encodeURIComponent(window.location.href);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      });
    });
  </script>
</body>
</html>
