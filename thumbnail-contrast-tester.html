<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Contrast Tester | Toolsbunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #000; color: #fff; font-family: sans-serif; }</style>
</head>
<body class="p-10">
    <main class="max-w-2xl mx-auto bg-[#16161A] p-8 rounded border border-zinc-800">
        <h1 class="text-2xl font-bold mb-4">Thumbnail Tester</h1>
        <input type="file" id="fileIn" class="mb-4 block w-full text-sm text-zinc-400 file:bg-indigo-600 file:border-0 file:px-4 file:py-2 file:rounded">
        <div id="previewGrid" class="grid grid-cols-2 gap-4 hidden">
            <img id="imgBlur" class="grayscale blur-sm w-full" alt="Blur View">
            <img id="imgMono" class="grayscale w-full" alt="Mono View">
        </div>
    </main>
    <script>
        document.getElementById('fileIn').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('imgBlur').src = event.target.result;
                    document.getElementById('imgMono').src = event.target.result;
                    document.getElementById('previewGrid').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
