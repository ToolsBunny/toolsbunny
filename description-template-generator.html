<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Description Generator | Toolsbunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Space Grotesk', sans-serif; background: #000; color: white; }</style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md py-3 px-10 flex items-center justify-between border-b border-zinc-900 z-50">
        <a href="/"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" class="h-12 w-auto object-contain" alt="Logo"></a>
    </nav>
    <main class="flex-grow pt-32 pb-20 px-10 max-w-4xl mx-auto w-full">
        <div class="bg-[#16161A] p-8 rounded-lg border border-zinc-900">
            <h1 class="text-2xl font-bold mb-6">Metadata Generator</h1>
            <textarea id="hookSummary" class="w-full p-3 bg-black border border-zinc-800 rounded mb-4" placeholder="Hook..."></textarea>
            <textarea id="timestamps" class="w-full p-3 bg-black border border-zinc-800 rounded mb-4" placeholder="Timestamps..."></textarea>
            <button id="genBtn" class="bg-indigo-600 w-full py-3 rounded font-bold">Compile</button>
            <textarea id="outputBlock" class="w-full mt-4 p-3 bg-black border border-zinc-800 rounded h-32 text-teal-400" readonly></textarea>
        </div>
    </main>
    <footer class="py-10 border-t border-zinc-900 text-center text-zinc-600 text-[10px] uppercase">&copy; 2026 Toolsbunny.</footer>
    <script>
        document.getElementById('genBtn').addEventListener('click', () => {
            document.getElementById('outputBlock').value = `${document.getElementById('hookSummary').value}\n\nTIMESTAMPS:\n${document.getElementById('timestamps').value}`;
        });
    </script>
</body>
</html>
