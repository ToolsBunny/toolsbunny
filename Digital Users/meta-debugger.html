<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Tag Debugger & Social Share Open Graph Simulator | ToolsBunny</title>
  <meta name="description" content="Debug and preview social media links. Test Open Graph metadata parameters for platform visibility across X, LinkedIn, and mobile link layouts.">
  <meta property="og:title" content="Meta Tag Debugger & Social Share Open Graph Simulator | ToolsBunny">
  <meta property="og:description" content="Analyze and map your metadata presentation metrics through an isolated rendering simulation frame.">
  <meta property="og:url" content="https://toolsbunny.com/meta-debugger">
  <meta property="og:image" content="https://toolsbunny.com/assets/og-meta-debugger.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'JetBrains Mono', monospace; background-color: #080808; color: #E4E4E7; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .tb-vault-card { background-color: #16161A; border: 1px solid #2A2A35; border-radius: 6px; }
    #bunny-ad-slot { margin: 20px 0; min-height: 100px; background-color: #0b0b0d; border: 1px dashed #2a2a35; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    .tb-share-row { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a35; }
    .tb-btn-share { background: none; border: none; color: #A1A1AA; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s ease; text-transform: uppercase; tracking: 0.05em; }
    .tb-btn-share:hover { color: #FFFFFF; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl tb-vault-card p-6">
    <div class="flex items-center justify-between border-b border-[#2A2A35] pb-4">
      <div>
        <h1 class="text-xl tracking-tight text-white uppercase">🌐 OG_TAG_DEBUGGER_SIMULATOR</h1>
        <p class="text-xs text-gray-500 mt-1">Audit Open Graph structures manually via visual layout parsing preview frames.</p>
      </div>
    </div>

    <div id="bunny-ad-slot">
      <span class="text-[10px] text-gray-600 uppercase tracking-widest">Advertisement Space</span>
    </div>

    <div class="space-y-4 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Meta Entry Title</label>
          <input type="text" id="ogTitleIn" value="Launch Platform Workspace Engine" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2.5 text-xs text-white focus:outline-none focus:border-[#635BFF]">
        </div>
        <div>
          <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Graphic Asset Matrix URL</label>
          <input type="text" id="ogImageIn" value="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe" class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2.5 text-xs text-white focus:outline-none focus:border-[#635BFF]">
        </div>
      </div>

      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Og Representation Matrix Description String</label>
        <input type="text" id="ogDescIn" value="Deploy hyper scalable infrastructure systems using local memory pipelines." class="w-full bg-[#080808] border border-[#2A2A35] rounded-[6px] p-2.5 text-xs text-white focus:outline-none focus:border-[#635BFF]">
      </div>

      <button id="runSimEngine" class="w-full bg-[#635BFF] hover:bg-[#635BFF]/90 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-[6px] transition-all cursor-pointer">Instantiate Card Simulation Layout</button>

      <div>
        <label class="block text-[10px] text-gray-400 uppercase tracking-widest mb-1.5">Simulated Component Layout Wireframe (X Preview Mode)</label>
        <div id="simulatedCardFrame" class="border border-[#2A2A35] bg-[#0c0c0e] rounded-[12px] overflow-hidden max-w-md mx-auto hidden">
          <div class="h-40 bg-cover bg-center" id="cardGraphicNode"></div>
          <div class="p-3 border-t border-[#2A2A35] text-xs space-y-1">
            <p class="text-gray-500 text-[10px] uppercase tracking-wider">domain.com</p>
            <p class="font-bold text-white text-ellipsis overflow-hidden whitespace-nowrap" id="cardTitleNode"></p>
            <p class="text-gray-400 text-[11px] line-clamp-2" id="cardDescNode"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-between bg-[#080808] border border-[#2A2A35] p-3 rounded-[6px]">
      <span class="text-[10px] text-gray-500 uppercase" id="auditEngineLog">Debugger Frame Status: Operational</span>
    </div>

    <div class="tb-share-row">
      <button class="tb-btn-share" id="bookmarkBtn">⭐ Bookmark Tool</button>
      <button class="tb-btn-share" id="shareXBtn">𝕏 Share on X</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const ogTitleIn = document.getElementById('ogTitleIn');
      const ogImageIn = document.getElementById('ogImageIn');
      const ogDescIn = document.getElementById('ogDescIn');
      const runSimEngine = document.getElementById('runSimEngine');
      const simulatedCardFrame = document.getElementById('simulatedCardFrame');
      const cardGraphicNode = document.getElementById('cardGraphicNode');
      const cardTitleNode = document.getElementById('cardTitleNode');
      const cardDescNode = document.getElementById('cardDescNode');
      const auditEngineLog = document.getElementById('auditEngineLog');
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      const shareXBtn = document.getElementById('shareXBtn');

      runSimEngine.addEventListener('click', () => {
        cardGraphicNode.style.backgroundImage = `url('${ogImageIn.value}')`;
        cardTitleNode.textContent = ogTitleIn.value;
        cardDescNode.textContent = ogDescIn.value;
        simulatedCardFrame.classList.remove('hidden');

        auditEngineLog.textContent = "SIM ENGINE DETECTED: 0 ATTRIBUTION CHECKS FAILING";
        auditEngineLog.className = "text-[10px] font-bold uppercase text-[#00FFC2]";
      });

      bookmarkBtn.addEventListener('click', () => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        alert(`Press [${isMac ? 'Cmd+D' : 'Ctrl+D'}] to quickly bookmark ToolsBunny to your toolbar panel!`);
      });

      shareXBtn.addEventListener('click', () => {
        const text = encodeURIComponent("Audit and visual map Open Graph preview boundaries before shipping tracking tags onto layout production nodes.");
        const url = encodeURIComponent(window.location.href);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      });
    });
  </script>
</body>
</html>
